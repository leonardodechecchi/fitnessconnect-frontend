@let user = user$ | async;

<p-menubar
  [model]="menuItems"
  [style]="{ 'background-color': 'white', 'border-bottom': '0.5px solid #f5f5f5',  }"
>
  <p-menu #menu popup="true" appendTo="body" [model]="avatarMenuItems" />
  <ng-template #start>
    <h1 class="text-xl font-bold">FitnessConnect</h1>
  </ng-template>
  <ng-template #end>
    <div class="flex items-center gap-5">
      <p-button icon="pi pi-bell" severity="secondary" size="small" />
      <p-avatar
        shape="circle"
        [image]="user?.profilePictureUrl"
        [style]="{ cursor: 'pointer' }"
        (click)="menu.toggle($event)"
      />
    </div>
  </ng-template>
</p-menubar>
