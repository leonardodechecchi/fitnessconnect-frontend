<p-card>
  <div class="flex flex-wrap justify-between gap-4">
    <div class="flex flex-col gap-4">
      <h1 class="text-2xl font-extrabold">{{ wishlist().name }}</h1>
      <div class="flex gap-4">
        <p-button icon="pi pi-trash" rounded="true" severity="secondary" />
        <p-button icon="pi pi-pencil" rounded="true" severity="secondary" />
      </div>
    </div>
    @if (item$ | async; as item) {
    <p-image
      [src]="item[0].trainer.user.profilePictureUrl"
      width="250"
      imageClass="rounded-lg"
    />
    }
  </div>
</p-card>
