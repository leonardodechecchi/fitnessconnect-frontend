@let realItem = item() | async;

<p-card>
  <div class="flex flex-wrap justify-between gap-4">
    <div class="flex flex-col gap-4">
      <h1 class="text-2xl">{{ wishlist().name }}</h1>
      <div class="flex gap-4">
        <p-button label="Delete" rounded="true" severity="secondary" />
        <p-button label="Edit" rounded="true" severity="secondary" />
      </div>
    </div>
    <p-image
      [src]="realItem?.at(0)?.trainer?.user?.profilePictureUrl"
      width="250"
      imageClass="rounded-lg"
    />
  </div>
</p-card>
