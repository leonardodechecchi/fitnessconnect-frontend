@let trainerAndSlots = trainerAndSlots$ | async;

<div class="container mx-auto px-9">
  <app-add-to-wishlist-dialog
    [(show)]="isDialogVisible"
    [trainerId]="trainerId()"
  />

  <div class="grid grid-cols-1 md:grid-cols-6 gap-4 p-4">
    <div class="md:col-span-2 md:row-span-2">
      @if (trainerAndSlots) {
      <div class="flex flex-col gap-4">
        <app-trainer-card [trainer]="trainerAndSlots.trainer" />
        <p-button
          icon="pi pi-plus"
          label="Add to wishlist"
          severity="secondary"
          fluid
          (onClick)="openAddToWishlistDialog()"
        />
      </div>
      }
    </div>

    <div class="md:col-span-4">
      <p-card header="Biografia">
        @if (trainerAndSlots) {
        <p>{{ trainerAndSlots.trainer.bio }}</p>
        }
      </p-card>
    </div>
    <div class="md:col-span-4 md:row-span-2">
      <p-card header="Slot Disponibili">
        <div class="flex flex-col gap-2 mb-2">
          <label for="date-picker" class="font-semibold"
            >Seleziona una data</label
          >
          <p-date-picker
            inputId="date-picker"
            [formControl]="date"
            [showIcon]="true"
            [iconDisplay]="'input'"
            (onSelect)="onDateChange($event)"
            dateFormat="dd-mm-yy"
            styleClass="mb-3"
          />
        </div>

        <!-- TODO -->

        <div class="grid grid-cols-4 gap-4">
          <div
            class="flex justify-center border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors duration-200 p-5"
            [style]="{ cursor: 'pointer' }"
          >
            <span class="font-semibold">11:00-12:00</span>
          </div>
          <div
            class="flex justify-center border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors duration-200 p-5"
          >
            <span class="font-semibold">11:00-12:00</span>
          </div>
          <div
            class="flex justify-center border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors duration-200 p-5"
          >
            <span class="font-semibold">11:00-12:00</span>
          </div>
          <div
            class="flex justify-center border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors duration-200 p-5"
          >
            <span class="font-semibold">11:00-12:00</span>
          </div>
          <div
            class="flex justify-center border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors duration-200 p-5"
          >
            <span class="font-semibold">11:00-12:00</span>
          </div>
          @for (item of availableSlots(); track $index) { }
        </div>
        <p-divider />
        <p-button label="Conferma e Prenota" [disabled]="true" fluid />
      </p-card>
    </div>
  </div>
</div>
