<p-card [header]="trainer().user.fullName" class="h-full">
  <ng-template #header>
    <img
      [src]="trainer().user.profilePictureUrl"
      class="w-full rounded-t-2xl"
    />
  </ng-template>
  <p>{{ trainer().bio }}</p>
  @if (specialties()) {
  <ng-template #footer>
    <div class="flex flex-wrap gap-2">
      @for (specialty of specialties(); track specialty.id) {
      <p-chip [label]="specialty.name" />
      }
    </div>
  </ng-template>
  }
</p-card>
