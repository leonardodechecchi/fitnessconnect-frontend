<div class="@container">
  <div class="grid grid-cols-1 @lg:grid-cols-2 @xl:grid-cols-3 gap-4">
    @for (trainer of (trainers$ | async)?.data; track trainer.user.id) {
      <a [routerLink]="['/trainers', trainer.user.id]">
        <app-trainer-card
          [trainer]="trainer"
          [specialties]="trainer.specialties"
        />
      </a>
    } @empty {
      <!-- TODO -->
    }
  </div>
</div>
